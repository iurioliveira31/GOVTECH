services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-aplicativo_prod}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_prod_password}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_prod_password}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 64M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.2
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-elastic_prod_password}
      - 'ES_JAVA_OPTS=-Xms1024m -Xmx1024m'
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        - 'CMD-SHELL'
        - 'curl -s http://localhost:9200 >/dev/null || exit 1'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2048M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  api-gateway:
    image: ghcr.io/iurioliveira31/govtech-api-gateway:latest
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aplicativo_prod}?schema=public&connection_limit=30
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_prod_password}@redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-elastic_prod_password}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-LicitaAI <noreply@licitaai.com.br>}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_prod}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_STARTER_MONTHLY=${STRIPE_PRICE_STARTER_MONTHLY}
      - STRIPE_PRICE_STARTER_ANNUAL=${STRIPE_PRICE_STARTER_ANNUAL}
      - STRIPE_PRICE_PRO_MONTHLY=${STRIPE_PRICE_PRO_MONTHLY}
      - STRIPE_PRICE_PRO_ANNUAL=${STRIPE_PRICE_PRO_ANNUAL}
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=LicitaAI_SecretKey_123!
      - EVOLUTION_INSTANCE_NAME=LicitaAI
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-LicitaAI_InternalKey_DefaultSecret_123!}
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  worker:
    image: ghcr.io/iurioliveira31/govtech-worker:latest
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aplicativo_prod}?schema=public&connection_limit=30
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_prod_password}@redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-elastic_prod_password}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-LicitaAI <noreply@licitaai.com.br>}
      - WHATSAPP_PROVIDER=evolution
      - WHATSAPP_API_URL=http://evolution-api:8080/message/sendText/LicitaAI
      - WHATSAPP_API_KEY=LicitaAI_SecretKey_123!
      - GEMINI_API_KEY=${GEMINI_API_KEY:-configure_gemini_api_key_aqui}
      - PNCP_PAGE_SIZE=50
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-LicitaAI_InternalKey_DefaultSecret_123!}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  web:
    image: ghcr.io/iurioliveira31/govtech-web:latest
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://137.131.227.255:4000/api/v1}
      - INTERNAL_API_URL=http://api-gateway:4000/api/v1
    ports:
      - '3000:3000'
    depends_on:
      - api-gateway
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  evolution-api:
    image: evoapicloud/evolution-api:latest
    restart: always
    environment:
      - SERVER_URL=http://evolution-api:8080
      - DOCKER_ENV=true
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aplicativo_prod}?schema=evolution_api
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aplicativo_prod}?schema=evolution_api
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://:${REDIS_PASSWORD:-redis_prod_password}@redis:6379/6
      - CACHE_REDIS_PREFIX_KEY=evolution
      - LOG_LEVEL=ERROR
      - AUTHENTICATION_API_KEY=LicitaAI_SecretKey_123!
      - AUTHENTICATION_TYPE=apikey
    volumes:
      - evolution-instances:/evolution/instances
      - evolution-store:/evolution/store
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 256M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  bullboard:
    image: deadly0/bull-board:latest
    restart: always
    ports:
      - '3001:3000'
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_prod_password}
      USER_LOGIN: ${BULLBOARD_USER:-admin}
      USER_PASSWORD: ${BULLBOARD_PASSWORD:?BULLBOARD_PASSWORD is required}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  postgres-data:
  redis-data:
  es-data:
  evolution-instances:
  evolution-store:
